Resources:
  CreateTestDBPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Action: "s3:*"
            Resource:
             - "arn:aws:dynamodb:us-east-1:123456789012:table/Users"
             - "*"
      Users:
        - TestUser
      Description: "Policy for creating a test database"
